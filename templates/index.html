<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岩土报告智能解析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header h1 { color: #333; margin-bottom: 8px; }
        .header p { color: #666; font-size: 14px; }

        .upload-area {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 24px;
            border: 2px dashed #ddd;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
        .upload-icon { font-size: 48px; margin-bottom: 16px; }
        .upload-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 16px;
            font-size: 16px;
        }
        .file-info { margin-top: 10px; color: #666; }

        .progress-container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            display: none;
        }
        .progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); width: 0%; transition: width 0.3s; }
        .progress-text { text-align: center; color: #666; margin-top: 10px; }

        .table-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .table-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            overflow-x: auto;
            display: block;
        }
        .data-table th, .data-table td {
            border: 1px solid #e0e0e0;
            padding: 8px 12px;
            text-align: center;
            vertical-align: middle;
        }
        .data-table th {
            background: #f8f9fa;
            font-weight: bold;
            position: sticky;
            top: 0;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            min-width: 100px;
        }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; }

        .scrollable { max-height: 500px; overflow-y: auto; border: 1px solid #e8e8e8; border-radius: 8px; background: white; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-msg { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; padding: 12px 24px; border-radius: 8px; display: none; z-index: 1000; }

        .empty-placeholder { background-color: #f5f5f5 !important; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏗️ 岩土报告智能解析系统</h1>
            <p>原始表格提取与显示 | 先合并相邻相同单元格，再按表头切分</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📄</div>
            <h3>上传岩土工程勘察报告</h3>
            <p style="color: #666; margin: 10px 0;">支持 .docx, .pdf, .txt 格式</p>
            <button class="upload-btn" id="uploadBtn">选择文件</button>
            <input type="file" id="fileInput" accept=".docx,.pdf,.txt" style="display: none;">
            <div id="fileInfo" class="file-info"></div>
        </div>

        <div class="progress-container" id="progressContainer">
            <h4>正在解析文档... <span class="loading-spinner"></span></h4>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <div class="results-container" id="resultsContainer" style="display: none;">
            <div class="stats" id="statsContainer"></div>
            <div id="originalContent"></div>
        </div>
    </div>

    <div class="success-msg" id="successMsg">✅ 解析完成！</div>

    <script>
        let currentTaskId = null;
        let pollInterval = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');

        uploadBtn.onclick = () => fileInput.click();
        uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); };
        uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
        uploadArea.ondrop = (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); };

        async function handleFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            document.getElementById('fileInfo').innerHTML = '<span class="loading-spinner"></span> 上传中...';

            try {
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.task_id) {
                    currentTaskId = data.task_id;
                    showProgress();
                    startPolling(currentTaskId);
                    document.getElementById('fileInfo').innerHTML = `📎 ${file.name} - 已上传，正在解析...`;
                } else {
                    document.getElementById('fileInfo').innerHTML = '❌ 上传失败';
                }
            } catch (error) {
                document.getElementById('fileInfo').innerHTML = '❌ 网络错误';
            }
        }

        function showProgress() {
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('resultsContainer').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').innerText = '0%';
        }

        function startPolling(taskId) {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/task/${taskId}`);
                    const task = await response.json();
                    updateProgress(task.progress || 0);

                    if (task.status === 'completed') {
                        clearInterval(pollInterval);
                        await loadResult(taskId);
                    } else if (task.status === 'failed') {
                        clearInterval(pollInterval);
                        document.getElementById('fileInfo').innerHTML = `❌ 解析失败: ${task.error}`;
                        alert('解析失败: ' + task.error);
                    }
                } catch (error) {
                    console.error('轮询错误:', error);
                }
            }, 1000);
        }

        function updateProgress(progress) {
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressText').innerText = `${progress}%`;
        }

        async function loadResult(taskId) {
            try {
                const response = await fetch(`/api/result/${taskId}`);
                const result = await response.json();

                if (result.error) {
                    alert(result.error);
                } else {
                    displayResults(result);
                    document.getElementById('progressContainer').style.display = 'none';
                    document.getElementById('resultsContainer').style.display = 'block';
                    document.getElementById('fileInfo').innerHTML = '✅ 解析完成！';
                    showSuccess('解析完成！');
                }
            } catch (error) {
                alert('加载结果失败: ' + error.message);
            }
        }

        function displayResults(result) {
            const tables = result.tables || [];

            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card"><div class="stat-number">${tables.length}</div><div class="stat-label">表格数量</div></div>
                <div class="stat-card"><div class="stat-number">${result.text_count || 0}</div><div class="stat-label">文本段落</div></div>
            `;

            displayOriginalTables(tables);
        }

        function displayOriginalTables(tables) {
            const container = document.getElementById('originalContent');
            if (!tables || tables.length === 0) {
                container.innerHTML = '<div class="table-card"><p>未检测到表格数据</p></div>';
                return;
            }

            container.innerHTML = tables.map((table, idx) => {
                const originalData = table.original_data || [];
                const metadata = table.metadata || {};
                const tableId = table.table_id || `T_${idx+1}`;

                if (!originalData.length) return '';

                const maxCols = Math.max(...originalData.map(r => r.length));

                return `
                    <div class="table-card">
                        <div class="table-title">
                            <span>📋 ${escapeHtml(tableId)} - 原始表格</span>
                            <span class="badge">${metadata.rows}行 × ${metadata.cols}列</span>
                        </div>
                        <div class="scrollable">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        ${Array(maxCols).fill(0).map((_, i) => `<th>列${i}</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${originalData.map((row, rowIdx) => `
                                        <tr>
                                            <td style="background:#f5f5f5; font-weight:bold;">${rowIdx}</td>
                                            ${Array(maxCols).fill(0).map((_, colIdx) => {
                                                const cell = colIdx < row.length ? row[colIdx] : '';
                                                const isEmpty = !cell || cell === '/' || cell === '—' || cell === '-';
                                                return `<td class="${isEmpty ? 'empty-placeholder' : ''}" title="${escapeHtml(cell)}">${escapeHtml(cell.substring(0, 50))}${cell.length > 50 ? '...' : ''}</td>`;
                                            }).join('')}
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.innerText = `✅ ${msg}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }
    </script>
</body>
</html>
