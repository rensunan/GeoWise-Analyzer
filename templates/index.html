<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岩土报告智能解析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header h1 { color: #333; margin-bottom: 8px; }
        .header p { color: #666; font-size: 14px; }

        .upload-area {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 24px;
            border: 2px dashed #ddd;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
        .upload-icon { font-size: 48px; margin-bottom: 16px; }
        .upload-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 16px;
            font-size: 16px;
        }
        .file-info { margin-top: 10px; color: #666; }

        .progress-container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            display: none;
        }
        .progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); width: 0%; transition: width 0.3s; }
        .progress-text { text-align: center; color: #666; margin-top: 10px; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }

        .table-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .table-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            overflow-x: auto;
            display: block;
        }
        .data-table th, .data-table td {
            border: 1px solid #e0e0e0;
            padding: 8px 12px;
            text-align: center;
            vertical-align: middle;
        }
        .data-table th {
            background: #f8f9fa;
            font-weight: bold;
            position: sticky;
            top: 0;
        }

        .info-bar {
            background: #e8f4f8;
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .badge {
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #667eea;
        }
        .badge-main { background: #d0f0d0; color: #2c6e2c; }
        .badge-remark { background: #f0e6d0; color: #cc6600; }
        .badge-sub { background: #d0e8f0; color: #0066cc; }
        .badge-optimized { background: #e0d0f0; color: #8844aa; }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            min-width: 100px;
        }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; }

        .scrollable { max-height: 500px; overflow-y: auto; border: 1px solid #e8e8e8; border-radius: 8px; background: white; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-msg { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; padding: 12px 24px; border-radius: 8px; display: none; z-index: 1000; }

        .empty-placeholder { background-color: #f5f5f5 !important; color: #999; }
        .section-title { margin: 15px 0 10px 0; font-size: 14px; font-weight: bold; }
        .optimization-note {
            background: #f0eaff;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #8844aa;
            display: inline-block;
        }
        .btn-optimize {
            background: linear-gradient(135deg, #8844aa, #aa66cc);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .btn-optimize:hover { opacity: 0.8; transform: scale(1.02); }
        .btn-optimize-all {
            background: linear-gradient(135deg, #ff9800, #ff5722);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .btn-optimize-all:hover { opacity: 0.8; transform: scale(1.02); }
        .optimizing { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏗️ 岩土报告智能解析系统</h1>
            <p>基于大语言模型的表格解析 | 主表 / 备注 / 附表识别 | 手动触发二次优化</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📄</div>
            <h3>上传岩土工程勘察报告</h3>
            <p style="color: #666; margin: 10px 0;">支持 .docx, .pdf, .txt 格式</p>
            <button class="upload-btn" id="uploadBtn">选择文件</button>
            <input type="file" id="fileInput" accept=".docx,.pdf,.txt" style="display: none;">
            <div id="fileInfo" class="file-info"></div>
        </div>

        <div class="progress-container" id="progressContainer">
            <h4>正在解析文档... <span class="loading-spinner"></span></h4>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <div class="results-container" id="resultsContainer" style="display: none;">
            <div class="stats" id="statsContainer"></div>

            <div style="text-align: center; margin-bottom: 20px;">
                <button class="btn-optimize-all" id="optimizeAllBtn">🚀 对所有表格进行二次优化</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="parsed">📊 第一次解析结果</button>
                <button class="tab-btn" data-tab="secondary">✨ 二次优化结果</button>
                <button class="tab-btn" data-tab="original">📋 原始表格</button>
                <button class="tab-btn" data-tab="towerLeg">塔腿合并</button>
            </div>
            <div id="parsedContent"></div>
            <div id="secondaryContent" style="display: none;"></div>
            <div id="originalContent" style="display: none;"></div>
            <div id="towerLegContent" style="display: none;"></div>
        </div>
    </div>

    <div class="success-msg" id="successMsg">✅ 操作完成！</div>

    <script>
        let currentTaskId = null;
        let pollInterval = null;
        let currentResult = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');

        uploadBtn.onclick = () => fileInput.click();
        uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); };
        uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
        uploadArea.ondrop = (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); };

        async function handleFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            document.getElementById('fileInfo').innerHTML = '<span class="loading-spinner"></span> 上传中...';

            try {
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.task_id) {
                    currentTaskId = data.task_id;
                    showProgress();
                    startPolling(currentTaskId);
                    document.getElementById('fileInfo').innerHTML = `📎 ${file.name} - 已上传，正在解析...`;
                } else {
                    document.getElementById('fileInfo').innerHTML = '❌ 上传失败';
                }
            } catch (error) {
                document.getElementById('fileInfo').innerHTML = '❌ 网络错误';
            }
        }

        function showProgress() {
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('resultsContainer').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').innerText = '0%';
        }

        function startPolling(taskId) {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/task/${taskId}`);
                    const task = await response.json();
                    updateProgress(task.progress || 0);

                    if (task.status === 'completed') {
                        clearInterval(pollInterval);
                        await loadResult(taskId);
                    } else if (task.status === 'failed') {
                        clearInterval(pollInterval);
                        document.getElementById('fileInfo').innerHTML = `❌ 解析失败: ${task.error}`;
                        alert('解析失败: ' + task.error);
                    }
                } catch (error) {
                    console.error('轮询错误:', error);
                }
            }, 1000);
        }

        function updateProgress(progress) {
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressText').innerText = `${progress}%`;
        }

        async function loadResult(taskId) {
            try {
                const response = await fetch(`/api/result/${taskId}`);
                const result = await response.json();

                if (result.error) {
                    alert(result.error);
                } else {
                    currentResult = result;
                    displayResults(result);
                    document.getElementById('progressContainer').style.display = 'none';
                    document.getElementById('resultsContainer').style.display = 'block';
                    document.getElementById('fileInfo').innerHTML = '✅ 解析完成！可点击优化按钮进行二次优化';
                    showSuccess('解析完成！');
                }
            } catch (error) {
                alert('加载结果失败: ' + error.message);
            }
        }

        async function optimizeSingleTable(tableIndex, tableName) {
            const btn = document.querySelector(`.optimize-btn-${tableIndex}`);
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> 优化中...';
                btn.classList.add('optimizing');
            }

            try {
                const response = await fetch(`/api/optimize/${currentTaskId}/${tableIndex}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table_name: tableName })
                });
                const data = await response.json();

                if (data.success) {
                    // 更新本地结果
                    if (currentResult && currentResult.tables && currentResult.tables[tableIndex]) {
                        currentResult.tables[tableIndex].secondary_optimized = data.optimization_result;
                    }
                    // 刷新显示
                    displayResults(currentResult);
                    showSuccess(`表格 ${tableName} 优化完成！`);
                } else {
                    alert('优化失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('优化失败: ' + error.message);
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '✨ 二次优化';
                    btn.classList.remove('optimizing');
                }
            }
        }

        async function optimizeAllTables() {
            const btn = document.getElementById('optimizeAllBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> 全局优化中...';
            btn.classList.add('optimizing');

            try {
                const response = await fetch(`/api/optimize_all/${currentTaskId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();

                if (data.success) {
                    // 重新加载结果
                    await loadResult(currentTaskId);
                    showSuccess(`已优化 ${data.optimized_count} 个表格！`);
                } else {
                    alert('优化失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('优化失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 对所有表格进行二次优化';
                btn.classList.remove('optimizing');
            }
        }

        function displayResults(result) {
            const tables = result.tables || [];
            let totalMainTables = 0;
            let totalRemarks = 0;
            let totalSubTables = 0;
            let totalOptimized = 0;

            tables.forEach(t => {
                if (t.main_table && t.main_table.length > 0) totalMainTables++;
                totalRemarks += t.remarks?.length || 0;
                totalSubTables += t.sub_tables?.length || 0;
                if (t.secondary_optimized &&
                    (t.secondary_optimized.main_table_optimized?.has_optimization ||
                     (t.secondary_optimized.sub_tables_optimized?.some(o => o.has_optimization)))) {
                    totalOptimized++;
                }
            });

            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card"><div class="stat-number">${tables.length}</div><div class="stat-label">解析表格</div></div>
                <div class="stat-card"><div class="stat-number">${totalMainTables}</div><div class="stat-label">主表</div></div>
                <div class="stat-card"><div class="stat-number">${totalRemarks}</div><div class="stat-label">备注</div></div>
                <div class="stat-card"><div class="stat-number">${totalSubTables}</div><div class="stat-label">附表</div></div>
                <div class="stat-card"><div class="stat-number">${totalOptimized}</div><div class="stat-label">已优化表格</div></div>
            `;

            displayParsedTables(tables);
            displaySecondaryOptimization(tables);
            displayOriginalTables(tables);
            displayTowerLegMerged(tables);
        }

        // 第一次解析结果 - 完全保持原样显示，添加优化按钮
        function displayParsedTables(tables) {
            const container = document.getElementById('parsedContent');
            if (!tables || tables.length === 0) {
                container.innerHTML = '<div class="table-card"><p>未检测到表格数据</p></div>';
                return;
            }

            container.innerHTML = tables.map((table, idx) => {
                const tableId = table.table_id || `T_${idx+1}`;
                const mainTable = table.main_table || [];
                const remarks = table.remarks || [];
                const subTables = table.sub_tables || [];
                const parseResult = table.parse_result || {};
                const hasOptimized = table.secondary_optimized &&
                    (table.secondary_optimized.main_table_optimized?.has_optimization ||
                     (table.secondary_optimized.sub_tables_optimized?.some(o => o.has_optimization)));

                return `
                    <div class="table-card">
                        <div class="table-title">
                            <span>📊 ${escapeHtml(tableId)}</span>
                            <div>
                                <span class="badge">${table.metadata?.rows || 0}行 × ${table.metadata?.cols || 0}列</span>
                                <button class="btn-optimize optimize-btn-${idx}" onclick="optimizeSingleTable(${idx}, '${escapeHtml(tableId)}')">
                                    ${hasOptimized ? '✅ 已优化' : '✨ 二次优化'}
                                </button>
                            </div>
                        </div>

                        <div class="info-bar">
                            <span class="badge badge-main">📌 主表: ${parseResult.has_main_table ? '是' : '否'}</span>
                            <span class="badge badge-remark">📝 备注: ${parseResult.has_remarks ? remarks.length + '个' : '无'}</span>
                            <span class="badge badge-sub">📋 附表: ${parseResult.has_sub_tables ? subTables.length + '个' : '无'}</span>
                            ${hasOptimized ? '<span class="badge badge-optimized">✨ 已二次优化</span>' : ''}
                        </div>

                        ${mainTable.length > 0 ? `
                            <div class="section-title">📌 主表</div>
                            <div class="scrollable">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            ${mainTable[0]?.map((cell, colIdx) => `<th>${escapeHtml(cell) || `列${colIdx}`}</th>`).join('')}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${mainTable.slice(1).map((row, rowIdx) => `
                                            <tr>
                                                ${row.map(cell => {
                                                    const isEmpty = !cell || cell === '/' || cell === '—' || cell === '-';
                                                    return `<td class="${isEmpty ? 'empty-placeholder' : ''}">${escapeHtml(cell || '')}</td>`;
                                                }).join('')}
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        ` : ''}

                        ${remarks.length > 0 ? `
                            <div class="section-title">📝 备注信息</div>
                            ${remarks.map((remark, rIdx) => `
                                <div style="background: #f8f9fa; padding: 10px; margin-bottom: 10px; border-radius: 8px;">
                                    <div style="font-size: 12px; color: #666;">备注 ${rIdx + 1}</div>
                                    <div style="margin-top: 5px;">
                                        ${remark.data?.map(row => row.join(' | ')).join('<br>') || '无内容'}
                                    </div>
                                </div>
                            `).join('')}
                        ` : ''}

                        ${subTables.length > 0 ? `
                            <div class="section-title">📋 附表</div>
                            ${subTables.map((subTab, sIdx) => `
                                <div style="margin-bottom: 15px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;">
                                    <div style="background: #e8f4f8; padding: 8px 12px; font-size: 12px; font-weight: bold;">附表 ${sIdx + 1}</div>
                                    <div class="scrollable" style="max-height: 300px;">
                                        <table class="data-table">
                                            <thead>
                                                <tr>
                                                    ${subTab.data?.[0]?.map((cell, colIdx) => `<th>${escapeHtml(cell) || `列${colIdx}`}</th>`).join('')}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${subTab.data?.slice(1).map(row => `
                                                    <tr>
                                                        ${row.map(cell => {
                                                            const isEmpty = !cell || cell === '/' || cell === '—' || cell === '-';
                                                            return `<td class="${isEmpty ? 'empty-placeholder' : ''}">${escapeHtml(cell || '')}</td>`;
                                                        }).join('')}
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            `).join('')}
                        ` : ''}

                        ${mainTable.length === 0 && remarks.length === 0 && subTables.length === 0 ?
                            '<p style="color: #999;">未能解析出结构化数据</p>' : ''}
                    </div>
                `;
            }).join('');
        }

        // 二次优化结果 - 显示优化后的表格
        function displaySecondaryOptimization(tables) {
            const container = document.getElementById('secondaryContent');
            if (!tables || tables.length === 0) {
                container.innerHTML = '<div class="table-card"><p>未检测到表格数据</p></div>';
                return;
            }

            let hasAnyOptimization = false;
            for (const table of tables) {
                const secOpt = table.secondary_optimized;
                if (secOpt && (secOpt.main_table_optimized?.has_optimization ||
                    (secOpt.sub_tables_optimized?.some(o => o.has_optimization)))) {
                    hasAnyOptimization = true;
                    break;
                }
            }

            if (!hasAnyOptimization) {
                container.innerHTML = '<div class="table-card"><p>✨ 暂无二次优化结果，请点击表格上的"二次优化"按钮进行优化</p></div>';
                return;
            }

            container.innerHTML = tables.map((table, idx) => {
                const tableId = table.table_id || `T_${idx+1}`;
                const secOpt = table.secondary_optimized;

                if (!secOpt) return '';

                const mainOpt = secOpt.main_table_optimized;
                const subOpts = secOpt.sub_tables_optimized || [];

                const hasMainOpt = mainOpt && mainOpt.has_optimization && mainOpt.optimized && mainOpt.optimized.length > 0;
                const hasSubOpts = subOpts.some(o => o.has_optimization && o.optimized && o.optimized.length > 0);

                if (!hasMainOpt && !hasSubOpts) return '';

                return `
                    <div class="table-card">
                        <div class="table-title">
                            <span>✨ ${escapeHtml(tableId)} - 二次优化结果</span>
                            <span class="badge badge-optimized">大模型智能优化</span>
                        </div>

                        ${hasMainOpt ? `
                            <div style="margin-top: 0;">
                                <div class="section-title">
                                    主表优化结果
                                    ${(mainOpt.optimization_type || []).map(type =>
                                        `<span class="optimization-note" style="margin-left: 10px;">${type === 'duplicate_rows' ? '🔄 已去重行' : type === 'duplicate_cols' ? '📊 已去重列' : '🔧 已拆分表头'}</span>`
                                    ).join('')}
                                </div>
                                ${mainOpt.explanation ? `<div class="optimization-note" style="margin-bottom: 10px; display: block;">💡 ${escapeHtml(mainOpt.explanation)}</div>` : ''}
                                <div class="scrollable">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                ${mainOpt.optimized[0]?.map((cell, colIdx) => `<th>${escapeHtml(cell) || `列${colIdx}`}</th>`).join('')}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${mainOpt.optimized.slice(1).map((row, rowIdx) => `
                                                <tr>
                                                    ${row.map(cell => {
                                                        const isEmpty = !cell || cell === '/' || cell === '—' || cell === '-';
                                                        return `<td class="${isEmpty ? 'empty-placeholder' : ''}">${escapeHtml(cell || '')}</td>`;
                                                    }).join('')}
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ` : ''}

                        ${subOpts.filter(o => o.has_optimization && o.optimized && o.optimized.length > 0).map((subOpt, sIdx) => `
                            <div style="margin-top: 20px;">
                                <div class="section-title">
                                    附表 ${subOpt.sub_table_index + 1} 优化结果
                                    ${(subOpt.optimization_type || []).map(type =>
                                        `<span class="optimization-note" style="margin-left: 10px;">${type === 'duplicate_rows' ? '🔄 已去重行' : type === 'duplicate_cols' ? '📊 已去重列' : '🔧 已拆分表头'}</span>`
                                    ).join('')}
                                </div>
                                ${subOpt.explanation ? `<div class="optimization-note" style="margin-bottom: 10px; display: block;">💡 ${escapeHtml(subOpt.explanation)}</div>` : ''}
                                <div class="scrollable">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                ${subOpt.optimized[0]?.map((cell, colIdx) => `<th>${escapeHtml(cell) || `列${colIdx}`}</th>`).join('')}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${subOpt.optimized.slice(1).map((row, rowIdx) => `
                                                <tr>
                                                    ${row.map(cell => {
                                                        const isEmpty = !cell || cell === '/' || cell === '—' || cell === '-';
                                                        return `<td class="${isEmpty ? 'empty-placeholder' : ''}">${escapeHtml(cell || '')}</td>`;
                                                    }).join('')}
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');
        }

        function displayTowerLegMerged(tables) {
            const container = document.getElementById('towerLegContent');
            if (!tables || tables.length === 0) {
                container.innerHTML = '<div class="table-card"><p>暂无塔腿合并结果</p></div>';
                return;
            }
            let hasAny = false;
            let html = '';
            tables.forEach((table, idx) => {
                const tlm = table.tower_leg_merged;
                if (!tlm || !tlm.merged) return;
                hasAny = true;
                const tableId = table.table_id || 'T_' + (idx + 1);
                const mergedTable = tlm.merged_main_table || [];
                const towerLegs = tlm.tower_legs || [];
                const matchAtoms = tlm.match_atoms || [];

                html += '<div class="table-card">';
                html += '<div class="table-title">';
                html += '<span>&#x1f3d7; ' + escapeHtml(tableId) + ' - 塔腿合并结果</span>';
                html += '<span class="badge badge-main">塔腿: ' + towerLegs.join(' / ') + '</span>';
                html += '</div>';
                html += '<div style="padding:8px 16px;color:#666;font-size:13px;">';
                html += '匹配原子词: <b>' + matchAtoms.join(', ') + '</b>';
                html += ' | 命中1行，扩展为<b>' + towerLegs.length + '</b>行';
                html += '</div>';
                if (mergedTable.length > 0) {
                    html += '<div style="overflow-x:auto;padding:0 16px 16px;">';
                    html += '<table class="data-table"><thead><tr>';
                    mergedTable[0].forEach((cell, colIdx) => {
                        const isTL = cell === '塔腿';
                        html += '<th' + (isTL ? ' style="background:#fff3cd;"' : '') + '>' + (escapeHtml(cell) || '列' + colIdx) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    mergedTable.slice(1).forEach(row => {
                        html += '<tr>';
                        row.forEach((cell, colIdx) => {
                            const isTL = mergedTable[0][colIdx] === '塔腿';
                            html += '<td' + (isTL ? ' style="background:#fffde7;font-weight:bold;"' : '') + '>' + escapeHtml(cell || '') + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table></div>';
                }
                html += '</div>';
            });
            if (!hasAny) {
                container.innerHTML = '<div class="table-card"><p>暂无塔腿合并结果（未检测到塔腿附表）</p></div>';
            } else {
                container.innerHTML = html;
            }
        }

        function displayOriginalTables(tables) {
            const container = document.getElementById('originalContent');
            if (!tables || tables.length === 0) {
                container.innerHTML = '<div class="table-card"><p>未检测到表格数据</p></div>';
                return;
            }

            container.innerHTML = tables.map((table, idx) => {
                const originalData = table.original_data || [];
                const metadata = table.metadata || {};
                const tableId = table.table_id || `T_${idx+1}`;

                if (!originalData.length) return '';

                const maxCols = Math.max(...originalData.map(r => r.length));

                return `
                    <div class="table-card">
                        <div class="table-title">
                            <span>📋 ${escapeHtml(tableId)} - 原始表格</span>
                            <span class="badge">${metadata.rows}行 × ${metadata.cols}列</span>
                        </div>
                        <div class="scrollable">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        ${Array(maxCols).fill(0).map((_, i) => `<th>列${i}</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${originalData.map((row, rowIdx) => `
                                        <tr>
                                            <td style="background:#f5f5f5; font-weight:bold;">${rowIdx}</td>
                                            ${Array(maxCols).fill(0).map((_, colIdx) => {
                                                const cell = colIdx < row.length ? row[colIdx] : '';
                                                const isEmpty = !cell || cell === '/' || cell === '—' || cell === '-';
                                                return `<td class="${isEmpty ? 'empty-placeholder' : ''}" title="${escapeHtml(cell)}">${escapeHtml(cell.substring(0, 50))}${cell.length > 50 ? '...' : ''}</td>`;
                                            }).join('')}
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.innerText = `✅ ${msg}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.getElementById('parsedContent').style.display = tab === 'parsed' ? 'block' : 'none';
                document.getElementById('secondaryContent').style.display = tab === 'secondary' ? 'block' : 'none';
                document.getElementById('originalContent').style.display = tab === 'original' ? 'block' : 'none';
                document.getElementById('towerLegContent').style.display = tab === 'towerLeg' ? 'block' : 'none';
            };
        });

        document.getElementById('optimizeAllBtn').onclick = () => {
            if (currentTaskId) {
                optimizeAllTables();
            }
        };
    </script>
</body>
</html>
